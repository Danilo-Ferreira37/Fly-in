[tool.black]
line-length = 79
target-version = ["py313"]
skip-string-normalization = false

[tool.flake8]
max-line-length = 79
extend-ignore = ["E203"]
select = ["E", "F", "W", "BLK"]
exclude = [
    ".git",
    "__pycache__",
    "venv",
    ".venv",
]

[tool.isort]
profile = "black"
line_length = 79
